      operationId: getFacets
      description: >-
        [Merged with the /search API - Please check the 'facets' parameter to the Search API above]
        Get the facets for the given simple filter criteria (by given VIN's basic specification,
        Or by Year, Make, Model, Trim criteria) and facet fields.
      parameters:
        - name: fields
          in: query
          required: true
          description: "Comma separated list of fields to generate facets for. Supported fields are - year, make, model, trim, exterior_color, interior_color, drivetrain, vehicle_type, car_type, body_style, body_subtype, doors."
          schema:
            type: string
        - name: api_key
          in: query
          description: The API Authentication Key. Mandatory with all API calls.
          schema:
            type: string
        - name: vin
          in: query
          description: VIN as a reference to the type of car for which facets data is to be returned
          schema:
            type: string
        - name: year
          in: query
          description: Year of the car
          schema:
            type: string
        - name: make
          in: query
          description: Make of the car
          schema:
            type: string
        - name: model
          in: query
          description: Model of the Car
          schema:
            type: string
        - name: trim
          in: query
          description: Trim of the Car
          schema:
            type: string
      responses:
        '200':
          description: Successful response with facets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FacetItem'

  /plots:
    get:
      tags:
        - Graphs
      summary: Price, Miles plots data for given criteria
      operationId: getPriceMilesPlotData
      description: "[DEPRECATED - Please check this in /search API using plot=true] Get price, miles plot data for active cars matching the given VIN's basic specification or Year, Make, Model, Trim (Optional) criteria"
      deprecated: true
      parameters:
        - name: car_type
          in: query
          required: true
          description: Car type to get the scatter plot data for
          schema:
            type: string
            enum: [new, used, certified]
        - name: api_key
          in: query
          description: The API Authentication Key. Mandatory with all API calls.
          schema:
            type: string
        - name: vin
          in: query
          description: VIN as a reference to the type of car for which plot data is to be returned
          schema:
            type: string
        - name: year
          in: query
          description: Year of the car
          schema:
            type: string
        - name: make
          in: query
          description: Make of the car
          schema:
            type: string
        - name: model
          in: query
          description: Model of the Car
          schema:
            type: string
        - name: trim
          in: query
          description: Trim of the Car
          schema:
            type: string
        - name: rows
          in: query
          description: Number of results to return. Default is 1000. Max is 10000.
          schema:
            type: integer
            default: 1000
            maximum: 10000
      responses:
