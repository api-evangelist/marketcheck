          description: Successful response with plot data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlotPoint'

components:
  schemas:

    Error:
      type: object
      properties:
        message:
          type: string
          description: Error message
        code:
          type: integer
          description: Error code

    BaseListing:
      type: object
      description: Base listing object containing minimal car listing information
      properties:
        id:
          type: string
          description: Unique listing identifier
        vin:
          type: string
          description: Vehicle Identification Number
        heading:
          type: string
          description: Listing heading / title
        price:
          type: number
          description: Listed price in USD
        miles:
          type: integer
          description: Odometer reading in miles
        msrp:
          type: number
          description: Manufacturer Suggested Retail Price
        data_source:
          type: string
          description: Source of the listing data
        source_url:
          type: string
          description: URL to the original listing source
        seller_type:
          type: string
          description: "Type of seller: dealer, private, auction"
          enum: [dealer, private, auction]
        car_type:
          type: string
          description: Type of car listing
          enum: [new, used, certified]
        scraped_at:
          type: integer
          description: Unix timestamp when the listing was scraped
        last_seen_at:
          type: integer
          description: Unix timestamp when the listing was last seen
        first_seen_at:
          type: integer
          description: Unix timestamp when the listing was first seen
        dom:
          type: integer
          description: Days on market
        dom_180:
          type: integer
          description: Days on market in the last 180 days
        dom_active:
          type: integer
          description: Active days on market
        dealer_id:
          type: string
          description: Dealer identifier
        ref_price:
          type: number
          description: Reference/comparison price
        ref_miles:
          type: number
          description: Reference/comparison miles
        ref_year:
          type: integer
          description: Reference year
        build:
          $ref: '#/components/schemas/Build'
        dealer:
          $ref: '#/components/schemas/Dealer'

    Listing:
      allOf:
        - $ref: '#/components/schemas/BaseListing'
      type: object
      description: Full listing object with all attributes
      properties:
        vdp_url:
          type: string
          description: URL to the Vehicle Details Page
        stock_no:
          type: string
          description: Dealer stock number
        inventory_type:
          type: string
          description: Inventory classification

    ListingExtraAttributes:
      type: object
      description: Extra long-text attributes for a listing
      properties:
        id:
          type: string
        seller_comments:
          type: string
          description: Seller comments from the listing
        options:
          type: array
          items:
            type: string
          description: List of vehicle options
        features:
          type: array
          items:
            type: string
          description: List of vehicle features

    ListingMedia:
      type: object
      description: Media assets associated with a listing
      properties:
        id:
          type: string
        photo_links:
          type: array
          items:
            type: string
          description: List of photo URLs
        photo_count:
          type: integer
          description: Total number of photos

    ListingVDP:
      type: object
      description: Vehicle Details Page HTML content
      properties:
        id:
          type: string
        html:
          type: string
          description: Cached HTML content of the Vehicle Details Page

    HistoricalListing:
      type: object
      description: Historical listing record for a vehicle
      properties:
        id:
          type: string
        vin:
          type: string
        price:
          type: number
          description: Listed price at time of listing
        miles:
          type: integer
          description: Odometer reading at time of listing
        scraped_at:
          type: integer
          description: Unix timestamp when listing was scraped
        last_seen_at:
          type: integer
          description: Unix timestamp when listing was last seen
        first_seen_at:
          type: integer
          description: Unix timestamp when listing was first seen
        dealer_id:
          type: string
        source:
          type: string
        seller_type:
          type: string
          enum: [dealer, private, auction]

    SearchResponse:
      type: object
      description: Response object from search API
      properties:
        num_found:
          type: integer
          description: Total number of listings found
        listings:
          type: array
          items:
            $ref: '#/components/schemas/Listing'
        stats:
          type: object
          description: Statistics for the search results
          additionalProperties: true
        facets:
          type: object
          description: Facets for the search results
          additionalProperties: true

    VinReport:
      type: object
      description: Summary report for a VIN
      properties:
        vin:
          type: string
        year:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        avg_price:
          type: number
        avg_miles:
          type: number
        num_active_listings:
          type: integer

    Dealer:
      type: object
      description: Dealer information
      properties:
        id:
          type: string
          description: Unique dealer identifier
        name:
          type: string
          description: Dealer name
        website:
          type: string
          description: Dealer website URL
        dealer_type:
          type: string
          description: Type of dealership
        zip:
          type: string
          description: Dealer zip code
        city:
          type: string
          description: Dealer city
        state:
          type: string
          description: Dealer state
        latitude:
          type: number
          description: Dealer latitude
        longitude:
          type: number
          description: Dealer longitude
        phone:
          type: string
          description: Dealer phone number
        franchises:
          type: array
          items:
            type: string
          description: List of car franchises/makes the dealer carries

    DealersResponse:
      type: object
      description: Response from dealers search
      properties:
        num_found:
          type: integer
          description: Total number of dealers found
        dealers:
          type: array
          items:
            $ref: '#/components/schemas/Dealer'

    DealerLandingPage:
      type: object
      description: Dealer landing page content
      properties:
        dealer_id:
          type: string
        html:
          type: string
          description: Cached HTML content of the dealer landing page

    DealerRating:
      type: object
      description: Dealer rating information
      properties:
        dealer_id:
          type: string
        overall_rating:
          type: number
          description: Overall dealer rating
        components:
          $ref: '#/components/schemas/RatingComponents'

    DealerReview:
      type: object
      description: Dealer review information
      properties:
        dealer_id:
          type: string
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/ReviewComponents'

    RatingComponents:
      type: object
      description: Rating components breakdown
      properties:
        customer_service:
          type: number
        facilities:
          type: number
        overall_experience:
          type: number
        recommend_dealer:
          type: number

    ReviewComponents:
      type: object
      description: Individual review data
      properties:
        rating:
          type: number
        title:
          type: string
        body:
          type: string
        author:
          type: string
        date:
          type: string

    Build:
      type: object
      description: Vehicle build/specification information decoded from VIN
      properties:
        year:
          type: integer
          description: Model year
        make:
          type: string
          description: Vehicle make
        model:
          type: string
          description: Vehicle model
        trim:
          type: string
          description: Vehicle trim level
        body_type:
          type: string
          description: Body type (sedan, SUV, truck, etc.)
        vehicle_type:
          type: string
          description: Vehicle type classification
        transmission:
          type: string
          description: Transmission type
        drivetrain:
          type: string
          description: Drivetrain type (FWD, AWD, RWD, 4WD)
        fuel_type:
          type: string
          description: Fuel type
        engine:
          type: string
          description: Engine description
        engine_size:
          type: string
          description: Engine displacement
        cylinders:
          type: integer
          description: Number of cylinders
        doors:
          type: integer
          description: Number of doors
        made_in:
          type: string
          description: Country of manufacture
        highway_fuel_economy:
          type: integer
          description: Highway fuel economy in MPG
        city_fuel_economy:
          type: integer
          description: City fuel economy in MPG

    Economy:
      type: object
      description: Environmental economy data for a vehicle
      properties:
        vin:
          type: string
        co2_five_year_cost:
          type: number
          description: CO2 cost over 5 years
        energy_impact_score:
          type: number
          description: Energy impact score
        ghg_score:
          type: number
          description: Greenhouse gas score
        smog_score:
          type: number
          description: Smog emission score

    FuelEfficiency:
      type: object
      description: Fuel efficiency data for a vehicle
      properties:
        vin:
          type: string
        highway:
          type: number
          description: Highway fuel efficiency in MPG
        city:
          type: number
          description: City fuel efficiency in MPG
        combined:
          type: number
          description: Combined fuel efficiency in MPG
        annual_fuel_cost:
          type: number
          description: Estimated annual fuel cost in USD

    SafetyRating:
      type: object
      description: Safety rating data from third party sources
      properties:
        vin:
          type: string
        overall_rating:
          type: number
          description: Overall safety rating
        frontal_crash_rating:
          type: string
          description: Frontal crash test rating
        side_crash_rating:
          type: string
          description: Side crash test rating
        rollover_rating:
          type: string
          description: Rollover test rating

    Averages:
      type: object
      description: Market averages for a vehicle type
      properties:
        price:
          type: number
          description: Average price
        miles:
          type: number
          description: Average mileage
        msrp:
          type: number
          description: Average MSRP
        dom:
          type: number
          description: Average days on market

    ComparisonPoint:
      type: object
      description: Market comparison data point
      properties:
        vin:
          type: string
        price:
          type: number
        miles:
          type: number
        dom:
          type: number
        data_points:
          type: array
          items:
            type: object
            additionalProperties: true

    CompetitorsPoint:
      type: object
      description: Competitor vehicle data
      properties:
        vin:
          type: string
        same_cars:
          $ref: '#/components/schemas/CompetitorsSameCars'
        similar_cars:
          $ref: '#/components/schemas/CompetitorsSimilarCars'

    CompetitorsSameCars:
      type: object
      description: Same vehicle competitors
      properties:
        avg_price:
          type: number
        avg_miles:
          type: number
        num_listings:
          type: integer
        cars:
          type: array
          items:
            $ref: '#/components/schemas/CompetitorsCarDetails'

    CompetitorsSimilarCars:
      type: object
      description: Similar vehicle competitors
      properties:
        avg_price:
          type: number
        avg_miles:
          type: number
        num_listings:
          type: integer
        cars:
          type: array
          items:
            $ref: '#/components/schemas/CompetitorsCarDetails'

    CompetitorsCarDetails:
      type: object
      description: Competitor car details
      properties:
        id:
          type: string
        vin:
          type: string
        price:
          type: number
        miles:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        year:
          type: integer

    DepreciationPoint:
      type: object
      description: Depreciation data for a vehicle
      properties:
        vin:
          type: string
        current_value:
          type: number
        depreciation_stats:
          type: array
          items:
            $ref: '#/components/schemas/DepreciationStats'

    DepreciationStats:
      type: object
      description: Annual depreciation statistics
      properties:
        year:
          type: integer
          description: Calendar year
        avg_price:
          type: number
          description: Average price for that year
        depreciation_pct:
          type: number
          description: Depreciation percentage from original

    Mds:
      type: object
      description: Market Days Supply data
      properties:
        vin:
          type: string
        mds:
          type: number
          description: Market Days Supply value
        supply:
          type: integer
          description: Number of supply units
        sales_per_day:
          type: number
          description: Average sales per day

    PopularityItem:
      type: object
      description: Popularity data item
      properties:
        year:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        popularity_index:
          type: number
          description: Popularity index score
        num_listings:
          type: integer

    TrendPoint:
      type: object
      description: Historical trend data point
      properties:
        date:
          type: string
          description: Date of the trend data point (YYYY-MM-DD)
        avg_price:
          type: number
          description: Average price on that date
        avg_miles:
          type: number
          description: Average miles on that date
        avg_dom:
          type: number
          description: Average days on market on that date
        num_listings:
          type: integer
          description: Number of listings on that date

    FacetItem:
      type: object
      description: A facet item with field name, value, and count
      properties:
        item:
          type: string
          description: Facet value
        count:
          type: integer
          description: Number of listings matching this facet value

    PlotPoint:
      type: object
      description: Price/miles scatter plot data point
      properties:
        id:
          type: string
        price:
          type: number
          description: Listing price
        miles:
          type: integer
          description: Odometer reading
        dom:
          type: integer
          description: Days on market
        latitude:
          type: number
        longitude:
          type: number
