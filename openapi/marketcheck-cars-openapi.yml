          schema:
            type: string
        - name: exact
          in: query
          description: Exact parameter
          schema:
            type: string
        - name: latitude
          in: query
          description: Latitude component of location
          schema:
            type: number
            format: float
        - name: longitude
          in: query
          description: Longitude component of location
          schema:
            type: number
            format: float
        - name: radius
          in: query
          description: Radius around the search location
          schema:
            type: integer
        - name: debug
          in: query
          description: Debug parameter
          schema:
            type: string
        - name: include_sold
