          in: query
          description: Year of the car
          schema:
            type: string
        - name: make
          in: query
          description: Make of the car
          schema:
            type: string
        - name: model
          in: query
          description: Model of the Car
          schema:
            type: string
        - name: trim
          in: query
          description: Trim of the Car
          schema:
