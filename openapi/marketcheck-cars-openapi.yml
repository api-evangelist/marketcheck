          schema:
            type: string
        - name: api_key
          in: query
          description: The API Authentication Key. Mandatory with all API calls.
          schema:
            type: string
        - name: stats
          in: query
          description: "The list of fields for which stats need to be generated. Allowed fields are - price, miles, msrp, dom."
          schema:
            type: string
      responses:
        '200':
          description: Successful response with popularity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PopularityItem'

  /trends:
    get:
      tags:
        - Market
      summary: Get Trends for criteria
      operationId: getTrends
      description: Get historical market trends for cars matching the given VIN's basic specification or Year, Make, Model, Trim (Optional) criteria
      parameters:
        - name: vin
          in: query
          required: true
          description: VIN as a reference to the type of car for which trend data is to be returned
          schema:
            type: string
        - name: car_type
          in: query
          required: true
          description: "Car type. Allowed values are: new / used / certified"
          schema:
            type: string
